info:
  name: test-intra-reader
  type: http
  seq: 1

http:
  method: POST
  url: "{{service_url}}/local/cognito/token"
  body:
    type: form-urlencoded
    data:
      - name: scope
        value: "{{access_token_scope}}"
      - name: sub
        value: test-intra-reader
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setVar("test_intra_reader_access_token", res.body.access_token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
